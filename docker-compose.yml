services:
  postgresdb:
    image: postgres:15
    restart: unless-stopped
    container_name: insex-commander-db

    environment:
      POSTGRES_USER: insex-commander
      POSTGRES_PASSWORD: index-commander
      POSTGRES_DB: corsair

    ports:
      - "5434:5432"

    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
